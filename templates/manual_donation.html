<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDMS Admin - Manual Cash/Cheque Entry</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 flex flex-col min-h-screen">

    <nav class="bg-blue-600 p-4 text-white shadow">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">PDMS Admin Dashboard</h1>
            <div>
                <a href="{% url 'admin_dashboard' %}" class="text-white hover:text-blue-200 mr-4">Back to Dashboard</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-8 flex-grow">
        <div class="max-w-2xl mx-auto bg-white p-8 rounded-lg shadow border border-gray-100">
            <h2 class="text-2xl font-bold mb-6 text-gray-800">Enter Cash or Cheque Donation</h2>

            {% if messages %}
            {% for message in messages %}
            <div class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4">{{ message }}</div>
            {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}

                {% for field in form %}
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="{{ field.id_for_label }}">
                        {{ field.label }}
                    </label>
                    {{ field }}
                    {% if field.errors %}
                    <p class="text-red-500 text-xs italic mt-1">{{ field.errors|striptags }}</p>
                    {% endif %}
                </div>
                {% endfor %}

                <div class="flex items-center justify-between mt-8">
                    <button type="submit"
                        class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded focus:outline-none focus:shadow-outline">
                        Log Donation & Send Receipt
                    </button>
                    <a href="{% url 'admin_dashboard' %}"
                        class="inline-block align-baseline font-bold text-sm text-gray-500 hover:text-gray-800">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </main>
</body>

</html>

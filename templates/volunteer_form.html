<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDMS Admin - {{ action }} Volunteer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 flex flex-col min-h-screen">

    <nav class="bg-blue-600 p-4 text-white shadow">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">PDMS Admin Dashboard</h1>
            <div>
                <a href="{% url 'volunteer_list' %}" class="text-white hover:text-blue-200 mr-4">Back to Volunteers</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-8 flex-grow">
        <div class="max-w-2xl mx-auto bg-white p-8 rounded-lg shadow border border-gray-100">
            <h2 class="text-2xl font-bold mb-6 text-gray-800">{{ action }} Volunteer Profile</h2>

            <form method="POST">
                {% csrf_token %}

                {% for field in form %}
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">
                        {{ field.label }}
                    </label>
                    {{ field }}
                    {% if field.errors %}
                    <p class="text-red-500 text-xs italic mt-1">{{ field.errors|striptags }}</p>
                    {% endif %}
                </div>
                {% endfor %}

                <div class="flex items-center justify-between mt-8">
                    <button type="submit"
                        class="bg-purple-600 hover:bg-purple-700 text-white font-bold py-2 px-6 rounded focus:outline-none focus:shadow-outline">
                        Save Volunteer
                    </button>
                    <a href="{% url 'volunteer_list' %}"
                        class="inline-block align-baseline font-bold text-sm text-gray-500 hover:text-gray-800">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </main>
</body>

</html>

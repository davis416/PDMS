<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDMS Admin - Confirm Delete</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md text-center">
        <h1 class="text-2xl font-bold mb-4 text-red-600">Delete Donor?</h1>

        <p class="text-gray-700 mb-6">Are you sure you want to permanently delete the profile for <strong>{{ donor.Email }}</strong>? This will also delete all associated donation records.</p>

        <form method="POST">
            {% csrf_token %}
            <div class="flex justify-between space-x-4">
                <a href="{% url 'donor_detail' donor.pk %}"
                    class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-2 px-4 rounded w-1/2">
                    Cancel
                </a>
                <button type="submit" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded w-1/2">
                    Confirm Delete
                </button>
            </div>
        </form>
    </div>

</body>

</html>
